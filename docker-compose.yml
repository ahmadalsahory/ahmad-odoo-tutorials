services:
  db:
    image: postgres:16
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo
    ports:
      - "5433:5432" 
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    restart: unless-stopped

  odoo:
    image: odoo:19
    command: --config /workspace/odoo.conf
    depends_on:
      - db
    ports:
      - "8069:8069"
      - "8072:8072"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=odoo
      - DB_PASSWORD=odoo
    volumes:
      - odoo-web-data:/var/lib/odoo
      - ./tutorials:/workspace/tutorials
      - ./odoo.conf:/workspace/odoo.conf
    restart: unless-stopped

volumes:
  odoo-db-data:
  odoo-web-data:

